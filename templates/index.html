<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>MeAI</title>

<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<div class="app">

<header class="header">
<h1>MeAI</h1>
<p>Medical AI Question Answering</p>
</header>

<div class="chat-area" id="chat">

<div class="message ai">
Welcome to MeAI. Ask a question about medication.
</div>

</div>

<div class="input-area">

<input
type="text"
id="question"
placeholder="Ask about drugs, symptoms, or side effects..."
onkeypress="handleEnter(event)"
>

<button onclick="askQuestion()">Ask</button>

</div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
